name: Deploy Application

on:
  push:
    branches: [ "main" ]

jobs:
  # ------------------------------------------------------------------
  # BACKEND DEPLOYMENT (Docker + EC2)
  # ------------------------------------------------------------------
  deploy-backend:
    runs-on: ubuntu-latest
    if: github.repository != 'vercel/next.js' # Prevents accidental deploys if forked
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build and Push Backend Image to ECR
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          file: ./backend/DockerFile
          push: true
          tags: ${{ steps.login-ecr.outputs.registry }}/las-analyzer-backend:latest
          cache-from: type=registry,ref=${{ steps.login-ecr.outputs.registry }}/las-analyzer-backend:latest
          cache-to: type=inline

      - name: Copy docker-compose.yml to EC2
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml,backend/src/models/schema.sql"
          target: "~/"

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Login to ECR
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${{ steps.login-ecr.outputs.registry }}
            
            # Export variables for the current session
            export ECR_REGISTRY=${{ steps.login-ecr.outputs.registry }}
            export CLAUDE_API_KEY="${{ secrets.CLAUDE_API_KEY }}"
            export DB_USER="${{ secrets.DB_USER }}"
            export DB_PASSWORD="${{ secrets.DB_PASSWORD }}"
            export DB_NAME="${{ secrets.DB_NAME }}"
            export CORS_ORIGIN="${{ secrets.CORS_ORIGIN }}"
            export AWS_S3_BUCKET="${{ secrets.AWS_S3_BUCKET }}"
            export AWS_REGION="${{ secrets.AWS_REGION }}"
            export AWS_ACCESS_KEY_ID="${{ secrets.S3_ACCESS_KEY_ID }}"
            export AWS_SECRET_ACCESS_KEY="${{ secrets.S3_SECRET_ACCESS_KEY }}"
            
            # Navigate to the compose file location
            cd ~/
            
            # Force stop and remove old containers to prevent name conflicts
            docker compose down --remove-orphans
            
            # Pull and Restart with forced recreation
            docker compose pull
            docker compose up -d --force-recreate