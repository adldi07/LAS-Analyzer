version: "3.9"

services:
  app:
    image: ${ECR_REGISTRY}/las-analyzer-backend:latest
    container_name: las-backend
    restart: always
    ports:
      - "80:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      CLAUDE_API_KEY: ${CLAUDE_API_KEY}
      DB_HOST: db
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
    depends_on:
      - db

  db:
    image: postgres:16
    container_name: las-postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
